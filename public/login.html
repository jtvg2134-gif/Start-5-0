<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start 5 | Entrar</title>
  <meta
    name="description"
    content="Tela de acesso do Start 5 para entrar ou criar conta e continuar a jornada de estudos."
  />
  <meta name="theme-color" content="#05080d" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Fraunces:wght@500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="auth-page">
  <a class="skip-link" href="#mainContent">Pular para o conteudo principal</a>
  <div class="auth-background" aria-hidden="true"></div>
  <div class="auth-overlay" aria-hidden="true"></div>

  <div class="page-shell auth-shell">
    <main class="auth-stage" id="mainContent">
      <section class="auth-card" aria-labelledby="authTitle">
        <div class="auth-switch" role="tablist" aria-label="Modo de acesso">
          <button
            type="button"
            class="auth-switch-button is-active"
            data-auth-view="login"
            aria-controls="authForm"
            aria-pressed="true"
          >
            Entrar
          </button>
          <button
            type="button"
            class="auth-switch-button"
            data-auth-view="register"
            aria-controls="authForm"
            aria-pressed="false"
          >
            Criar conta
          </button>
        </div>

        <header class="auth-card-head">
          <h1 class="auth-title" id="authTitle">Acesse sua conta</h1>
          <p class="auth-subtitle" id="authSubtitle"></p>
        </header>

        <form class="auth-form" id="authForm" autocomplete="on">
          <div class="auth-name-grid is-hidden" id="authNameRow">
            <div class="auth-field">
              <label for="authFirstNameInput" class="auth-label">Nome</label>
              <input
                type="text"
                id="authFirstNameInput"
                name="firstName"
                class="auth-input"
                autocomplete="given-name"
                minlength="2"
                placeholder="Seu nome"
                required
              />
            </div>

            <div class="auth-field">
              <label for="authLastNameInput" class="auth-label">Sobrenome</label>
              <input
                type="text"
                id="authLastNameInput"
                name="lastName"
                class="auth-input"
                autocomplete="family-name"
                minlength="2"
                placeholder="Seu sobrenome"
                required
              />
            </div>
          </div>

          <div class="auth-field">
            <label for="authEmailInput" class="auth-label">E-mail</label>
            <input
              type="email"
              id="authEmailInput"
              name="email"
              class="auth-input"
              inputmode="email"
              autocomplete="email"
              placeholder="voce@exemplo.com"
              required
            />
          </div>

          <div class="auth-field">
            <label for="authPasswordInput" class="auth-label">Senha</label>
            <input
              type="password"
              id="authPasswordInput"
              name="password"
              class="auth-input"
              autocomplete="current-password"
              minlength="6"
              placeholder="Minimo de 6 caracteres"
              required
            />
          </div>

          <div class="auth-field is-hidden" id="authConfirmField">
            <label for="authConfirmInput" class="auth-label">Confirmar senha</label>
            <input
              type="password"
              id="authConfirmInput"
              name="confirmPassword"
              class="auth-input"
              autocomplete="new-password"
              minlength="6"
              placeholder="Repita sua senha"
              required
            />
          </div>

          <p class="auth-feedback" id="authFeedback" aria-live="polite"></p>

          <button type="submit" class="auth-submit" id="authSubmitButton">
            Entrar
          </button>
        </form>
      </section>
    </main>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
